<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta Especial</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            text-align: center;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
        }

        .container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: all 0.2s ease;
            position: absolute;
        }

        #btn-si {
            background-color: #4caf50;
            color: white;
            left: 35%;
            transform: translateX(-50%);
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            left: 65%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <h1>¿Quieres ser mi novia de nuevo? ❤️</h1>

    <div class="container">
        <button id="btn-si">Sí</button>
        <button id="btn-no">No</button>
    </div>

    <script>
        const btnSi = document.getElementById('btn-si');
        const btnNo = document.getElementById('btn-no');
        let fontSizeSi = 1.2;

        // Opción: El botón NO se mueve solo
        btnNo.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            // Opción: El SÍ crece y el NO se hace pequeño
            fontSizeSi += 0.5;
            btnSi.style.fontSize = fontSizeSi + 'rem';
            btnSi.style.padding = (15 + fontSizeSi * 5) + 'px ' + (30 + fontSizeSi * 10) + 'px';
            
            let currentFontSizeNo = parseFloat(window.getComputedStyle(btnNo).fontSize);
            if (currentFontSizeNo > 5) {
                btnNo.style.fontSize = (currentFontSizeNo - 2) + 'px';
            }
        });

        btnSi.addEventListener('click', () => {
            alert('¡Sabía que dirías que sí, te amo mi reina hermosa, no seas tan malo conmigo! 🥰');
            document.body.innerHTML = '<h1>❤️ ¡te amoooooooooooooooooooooooooooooooooooooooo! ❤️</h1>';
        });
    </script>
</body>
</html>
